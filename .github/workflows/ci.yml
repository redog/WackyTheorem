name: Tauri CI

on:
  push:
    branches: [ main ]
    paths:
      - 'desktop/wkyt/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'desktop/wkyt/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/ci.yml'

jobs:
  build:
    runs-on: ${{ matrix.runs-on }}
    strategy:
      # One OS leg failing must not cancel the others: the Linux leg is the
      # Spec-mandated signal (DoD #1/#8) and needs to report independently.
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            runs-on: windows-latest
            platform: windows
          - os: macos-latest
            runs-on: macos-latest
            platform: macos
          - os: ubuntu-dev
            runs-on: [self-hosted, gumbo, ubuntu-dev]
            platform: linux
          - os: fedora-dev
            runs-on: [self-hosted, gumbo, fedora-dev]
            platform: linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: desktop/wkyt/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # The Cargo workspace root (and its target dir) is the repo root.
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Install system dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-dev'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libglib2.0-dev \
            libsqlite3-dev \
            libsoup-3.0-dev \
            pkg-config \
            cmake \
            libssl-dev \
            libx11-dev \
            libxkbcommon-dev \
            libsecret-1-dev \
            libdbus-1-dev \
            libgdk-pixbuf-xlib-2.0-dev

      - name: Install system dependencies (Fedora)
        if: matrix.os == 'fedora-dev'
        run: |
          sudo dnf install -y \
            gcc \
            gcc-c++ \
            make \
            webkit2gtk4.1-devel \
            gtk3-devel \
            libappindicator-gtk3-devel \
            librsvg2-devel \
            glib2-devel \
            sqlite-devel \
            libsoup3-devel \
            pkgconf-pkg-config \
            cmake \
            openssl-devel \
            libX11-devel \
            libxkbcommon-devel \
            libsecret-devel \
            dbus-devel \
            gdk-pixbuf2-devel

      - name: Install dependencies and build (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          npm install
          npm run tauri build
        working-directory: desktop/wkyt
        shell: powershell

      - name: Install dependencies and build (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew update
          brew install gtk+3
          npm install
          npm run tauri build
        working-directory: desktop/wkyt

      - name: Install dependencies and build (Linux)
        if: matrix.platform == 'linux'
        run: |
          npm install
          npm run tauri build
        working-directory: desktop/wkyt

      # Spec DoD #8: cargo test must be green on all Linux legs.
      - name: Run workspace tests (Linux)
        if: matrix.platform == 'linux'
        run: cargo test --workspace --locked

      - name: Upload build artifacts (Windows)
        if: matrix.os == 'windows-latest' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: wackythorem-windows
          path: target/release/bundle/
          retention-days: 14

      - name: Upload build artifacts (macOS)
        if: matrix.os == 'macos-latest' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: wackythorem-macos
          path: target/release/bundle/
          retention-days: 14

      - name: Upload build artifacts (Linux)
        if: matrix.platform == 'linux' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: wackythorem-${{ matrix.os }}
          path: target/release/bundle/
          retention-days: 14
