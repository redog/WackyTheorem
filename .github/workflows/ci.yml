name: Tauri CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: desktop/wkyt/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/wkyt/src-tauri

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libglib2.0-dev \
            libsqlite3-dev \
            libsoup-3.0-dev \
            pkg-config \
            cmake \
            libssl-dev \
            libx11-dev \
            libxkbcommon-dev \
            libsecret-1-dev \
            libdbus-1-dev \
            libgdk-pixbuf2.0-dev

      - name: Install dependencies and build (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          npm install
          npm run tauri build
        working-directory: desktop/wkyt
        shell: powershell

      - name: Install dependencies and build (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew update
          brew install gtk+3
          npm install
          npm run tauri build
        working-directory: desktop/wkyt

      - name: Install dependencies and build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          npm install
          npm run tauri build
        working-directory: desktop/wkyt

      - name: Upload build artifacts (Windows)
        if: matrix.os == 'windows-latest' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: wackythorem-windows
          path: desktop/wkyt/src-tauri/target/release/bundle/
          retention-days: 14

      - name: Upload build artifacts (macOS)
        if: matrix.os == 'macos-latest' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: wackythorem-macos
          path: desktop/wkyt/src-tauri/target/release/bundle/
          retention-days: 14

      - name: Upload build artifacts (Linux)
        if: matrix.os == 'ubuntu-latest' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: wackythorem-linux
          path: desktop/wkyt/src-tauri/target/release/bundle/
          retention-days: 14
